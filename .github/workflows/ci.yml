name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -q

      - name: Run linter
        run: |
          source .venv/bin/activate
          ruff check murasaki/ tests/

      - name: Check formatting
        run: |
          source .venv/bin/activate
          ruff format --check murasaki/ tests/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run pip-audit (dependency CVE scan)
        run: |
          source .venv/bin/activate
          uv pip install pip-audit
          pip-audit

      - name: Run Bandit (static security analysis)
        run: |
          source .venv/bin/activate
          uv pip install bandit
          bandit -r murasaki/ -c pyproject.toml || bandit -r murasaki/ -ll
